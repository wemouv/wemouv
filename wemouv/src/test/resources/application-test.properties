# ==============================================================================
# CONFIGURATION DE TEST (src/test/resources/application.properties)
# ==============================================================================

# Base de donnees H2 en memoire (isolee)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Cle secrete obligatoire pour faire fonctionner le service JWT pendant les tests
jwt.secret=123456789123456789123456789123456789123456789123456789

# Configuration mail factice pour satisfaire le contexte Spring
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test