```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<!-- HEAD -->
<th:block th:replace="fragments/head :: head('Accueil')"></th:block>

<body class="bg-light">

<!-- NAVBAR -->
<th:block th:replace="fragments/navbar :: navbar"></th:block>

<!-- CONTENU -->
<main class="container py-4">

    <!-- Bienvenue -->
    <section class="mb-4">

        <h2 class="fw-bold">
            Bienvenue
            <span th:text="${user.prenom}"></span>
        </h2>

        <h4 class="text-muted">
            Covoiturages disponibles
        </h4>

    </section>

    <!-- Liste -->
    <section class="border rounded bg-white p-3 shadow-sm"
             style="max-height: 600px; overflow-y:auto;">

        <div class="row g-3">

            <div class="col-lg-6"
                 th:each="covoit : ${covoiturages}">

                <div class="card shadow-sm h-100">

                    <div class="card-body d-flex">

                        <!-- Icône -->
                        <div class="me-3 d-flex align-items-center">
                            <i class="bi bi-car-front fs-1 text-secondary"></i>
                        </div>

                        <!-- Infos -->
                        <div class="flex-grow-1">

                            <div class="small">
                                <strong>Organisateur :</strong>
                                <span th:text="${covoit.organisateur.prenom}">
                                </span>
                            </div>

                            <div class="small">
                                <strong>Marque :</strong>
                                <span th:text="${covoit.vehicule.marque}">
                                </span>
                            </div>

                            <div class="small">
                                <strong>Motorisation :</strong>
                                <span th:text="${covoit.vehicule.motorisation}">
                                </span>
                            </div>

                            <div class="small">
                                <strong>Trajet :</strong>
                                <span th:text="${covoit.adresseDepart}"></span>
                                →
                                <span th:text="${covoit.adresseArrive}"></span>
                            </div>

                        </div>

                        <!-- Places -->
                        <div class="ms-3 d-flex align-items-center">

                            <span class="badge bg-primary fs-6"
                                  th:text="${covoit.nbPlacesRestantes + ' places'}">
                            </span>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

</main>

<!-- FOOTER -->
<th:block th:replace="fragments/footer :: footer"></th:block>

</body>
</html>
```
