spring.application.name=wemouv

# SQL (Production - injecté par le serveur)
spring.datasource.url=${PROD_DB_URL}
spring.datasource.username=${PROD_DB_USER}
spring.datasource.password=${PROD_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate

# Logs moins verbeux pour la performance
logging.level.root=INFO

# MAIL (injecté par le serveur)
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASSWORD}

# JWT (injecté par le serveur)
jwt.secret=${JWT_SECRET}